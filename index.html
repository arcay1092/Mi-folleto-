<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folleto Animado</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* Slides */
.slide {
  position: absolute;
  width: 100vw;
  height: 100vh;
  transition: left 1s ease;
}

/* Imágenes */
.slide img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* 🔥 no recorta */
  background: black;
}
</style>
</head>

<body>

<div class="slide" id="s1" style="left:0%">
  <img src="portada.jpg">
</div>

<div class="slide" id="s2" style="left:100%">
  <img src="contenido.jpg">
</div>

<div class="slide" id="s3" style="left:100%">
  <img src="r3.jpg">
</div>

<div class="slide" id="s4" style="left:100%">
  <img src="r4.jpg">
</div>

<script>
let slides = [
  document.getElementById("s1"),
  document.getElementById("s2"),
  document.getElementById("s3"),
  document.getElementById("s4")
];

let index = 0;

setInterval(() => {

  // mover actual a la izquierda
  slides[index].style.left = "-100%";

  // siguiente índice
  index = (index + 1) % slides.length;

  // traer siguiente al centro
  slides[index].style.left = "0%";

  // preparar los demás a la derecha
  slides.forEach((slide, i) => {
    if (i !== index && slide.style.left !== "-100%") {
      slide.style.left = "100%";
    }
  });

}, 5000); // 🔥 5 segundos
</script>

</body>
  </html>
