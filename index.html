<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Folleto Animado</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 1s;
}
</style>
</head>

<body>

<img src="portada.jpg" class="slide" id="s1" style="left:0%">
<img src="contenido.jpg" class="slide" id="s2" style="left:100%">
<img src="r3.jpg" class="slide" id="s3" style="left:100%">
<img src="r4.jpg" class="slide" id="s4" style="left:100%">

<script>
let slides = [
  document.getElementById("s1"),
  document.getElementById("s2"),
  document.getElementById("s3"),
  document.getElementById("s4")
];

let index = 0;

setInterval(() => {
  // ocultar actual
  slides[index].style.left = "-100%";

  // siguiente
  index = (index + 1) % slides.length;

  // mostrar siguiente
  slides[index].style.left = "0%";

  // preparar las demás
  for (let i = 0; i < slides.length; i++) {
    if (i !== index && slides[i].style.left !== "-100%") {
      slides[i].style.left = "100%";
    }
  }

}, 3000); // cambia cada 3 segundos
</script>

</body>
</html>
